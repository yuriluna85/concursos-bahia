name: Atualizar Concursos Publicos Bahia

on:
  schedule:
    # Agenda a execucao de 2 em 2 horas (com offset de 30 min da pos)
    - cron: '30 */2 * * *'
  workflow_dispatch: # Permite execucao manual pelo botao do GitHub Actions

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do Repositorio
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Executar Compilador de Concursos
      run: node compilador.js

    - name: Comitar e Enviar Atualizacoes para o GitHub
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add -A
        git diff-index --quiet HEAD || git commit -m "chore: atualizacao de concursos e metricas [skip ci]"
        git push origin main
